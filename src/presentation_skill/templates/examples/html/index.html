<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reveal Mode Reference</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section id="opening"></section>
      <section id="capability-compare"></section>
      <section id="asset-pipeline"></section>
      <section id="interactive-check"></section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/plugin/notes/notes.js"></script>
  <script type="module">
    import { slides } from './js/deck.js';
    import * as interactiveCheck from './js/slides/interactive-check.js';

    const interactiveModules = new Map([
      ['interactive-check', interactiveCheck],
    ]);

    for (const [id, html] of Object.entries(slides)) {
      const section = document.getElementById(id);
      if (section) section.innerHTML = html;
    }
    document.getElementById('interactive-check').innerHTML = interactiveCheck.html;

    let activeModule = null;
    function activateCurrentSlide() {
      activeModule?.cleanup?.();
      const id = Reveal.getCurrentSlide()?.id;
      activeModule = interactiveModules.get(id) || null;
      activeModule?.initialize?.();
    }

    await Reveal.initialize({
      hash: true,
      width: 1280,
      height: 720,
      margin: 0.04,
      center: false,
      plugins: [RevealNotes],
    });
    activateCurrentSlide();
    Reveal.on('slidechanged', activateCurrentSlide);
  </script>
</body>
</html>
